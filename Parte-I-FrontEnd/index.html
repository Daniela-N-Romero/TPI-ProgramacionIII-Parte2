<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css">
    <title>Food Store</title>
  </head>
  <body>
<div class="landing-container">
        <main class="landing-card">
            
            <header class="landing-header">
                <div class="landing-logo">
                    <span class="logo-icon">🍕</span>
                    <h1>Food Store</h1>
                </div>
                <p class="slogan">Tus comidas favoritas, listas para disfrutar.</p>
            </header>

            <hr class="landing-divider">

            <section class="landing-actions">
                <h2>¿Cómo deseas continuar?</h2>
                <p class="actions-sub">Explorá nuestro menú o ingresá a tu cuenta para gestionar tus pedidos.</p>
                
                <div class="actions-group">
                    <button class="btn btn-secondary btn-landing" id="btn-landing-guest">
                        Ver Catálogo como Invitado
                    </button>
                    
                    <button class="btn btn-primary btn-landing" id="btn-landing-login">
                         Ya estoy registrado / Ingresar
                    </button>
                </div>
            </section>

            <footer class="landing-footer">
                <p>© Daniela Nahir Romero TUPaD 2026.</p>
            </footer>

        </main>
    </div>

    <script src="/src/main.ts" type="module"></script>
  </body>
</html>
