<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store</title>
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>

    <header class="header-nav">
        <div class="logo">
            <span>🍕</span> Food Store
        </div>
        <nav>
            <ul class="nav-links" id="nav-links"></ul>
        </nav>
    </header>

    <div class="app-container">
        <aside class="sidebar" id="app-sidebar">
        </aside>

        <main class="main-content main-content-block" id="main-view">
            <div class="store-controls">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Buscar producto por nombre..." autocomplete="off">
                </div>
                <div class="sort-box">
                    <label for="sort-select">Ordenar por:</label>
                    <select id="sort-select">
                        <option value="none">Seleccionar...</option>
                        <option value="az">Nombre: A - Z</option>
                        <option value="za">Nombre: Z - A</option>
                        <option value="price-asc">Precio: Menor a Mayor</option>
                        <option value="price-desc">Precio: Mayor a Menor</option>
                    </select>
                </div>
            </div>

            <div id="products-container" class="products-grid"></div>
        </main>
    </div>

    <script type="module" src="/src/utils/layout.ts"></script>
    <script type="module" src="/src/pages/store/home/storeHome.ts"></script>
</body>

</html>
