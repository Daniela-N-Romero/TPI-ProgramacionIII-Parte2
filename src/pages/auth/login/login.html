<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../../../style.css">
</head>

<body>
    <div id="app">
        <section class="card session-card">
            <h1>Super Food</h1>
            <h3>Iniciar Sesión</h3>

            <form id="form">

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" autocomplete="off" placeholder="example@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" autocomplete="off" placeholder="********">
                </div>

                <button type="submit">Ingresar</button>

            </form>

            
            <p>¿No tenés cuenta? <a href="../registro/registro.html">Registrate</a></p>
            <a class="back-to-home"  href="../../../../index.html">Volver al Inicio</a>
        
            <span class="test-data">Cuentas de prueba:</span>
            <span class="test-data">admin@admin.com / admin123</span>
            <span class="test-data">cliente@food.com / cliente123</span>
            
        </section>
    </div>
    <script type="module" src="./login.ts"></script>
</body>

</html>
