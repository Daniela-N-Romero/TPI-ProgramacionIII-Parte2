<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Food Store</title>
    <link rel="stylesheet" href="../../../style.css">

</head>

<body>
    <div id="app">
        <section class="card session-card">

            <h1>Crear Cuenta 📝</h1>
            <form id="registro-form">
                <div class="form-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input class="password" type="password" id="password" name="password" required placeholder="••••••••"
                        pattern="^[a-zA-Z0-9]{6,20}$"
                        title="La contraseña debe tener entre 6 y 20 caracteres, y solo puede contener letras y números.">
                    <label for="password">Repita su contraseña:</label>
                    <input class="password" type="password" id="passwordConfirm" name="passwordConfirm" required placeholder="••••••••"
                        pattern="^[a-zA-Z0-9]{6,20}$"
                        title="La contraseña debe tener entre 6 y 20 caracteres, y solo puede contener letras y números.">
                </div>
                <div id="mensajesValidacion">
                    <p id="longitud" class="invalido">Debe contener entre 6 y 20 caracteres</p>
                    <p id="letra" class="invalido">Debe contener al menos una letra</p>
                    <p id="numero" class="invalido">Debe contener al menos un número</p>
                    <p id="igualdad" class="invalido">Las contraseñas no coinciden</p>
                </div>

                <button type="submit">Registrarse</button>
            </form>

            <p>¿Ya tenes cuenta? <a href="../login/login.html">Inicia sesión acá</a></p>
            <a href="../../../../index.html">Volver al Inicio</a>
        </section>

    </div>

    <script type="module" src="./registro.ts"></script>
</body>

</html>
